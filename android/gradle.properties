# Required because the app depends on AndroidX libraries (core-ktx,
# appcompat, material, recyclerview, activity-ktx, documentfile) --
# without this, Gradle's checkReleaseAarMetadata task fails the build
# with "Configuration ... contains AndroidX dependencies, but
# android.useAndroidX property is not enabled." This was missing from
# the original scaffold and is exactly what broke the first real CI run.
android.useAndroidX=true
android.enableJetifier=false

# Speeds up the build a little; harmless default otherwise.
org.gradle.jvmargs=-Xmx2048m
