name: Windows Build

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "windows/**"
      - ".github/workflows/windows-build.yml"
  pull_request:
    paths:
      - "core/**"
      - "windows/**"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core
            windows/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1" --locked

      - name: Build Tauri app (Windows bundle)
        working-directory: windows
        run: cargo tauri build

      - name: Zip the build output
        shell: bash
        run: |
          mkdir -p dist
          cp -r windows/src-tauri/target/release/bundle dist/bundle
          cd dist
          zip -r ../ZaoP2P-Windows.zip bundle

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZaoP2P-Windows
          path: ZaoP2P-Windows.zip
          if-no-files-found: error
